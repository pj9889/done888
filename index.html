<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger - Jacklyn Rose</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { height: 100%; overflow: hidden; background-color: #fff; width: 100%; position: fixed; }

        .verified-badge { color: #0084ff; font-size: 14px; margin-left: 4px; }
        .img-container { position: relative; display: inline-block; }
        .active-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #31a24c; border: 2px solid #fff; border-radius: 50%; }

        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 1000; }
        .profile-section { display: flex; align-items: center; }
        .header-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .user-info { margin-left: 10px; }
        .user-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; }

        .chat-container { position: absolute; top: 60px; bottom: 85px; width: 100%; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: #fff; }
        .middle-profile { text-align: center; margin: 30px 0; }
        .middle-pic { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; object-fit: cover; }
        
        .message-wrapper { display: flex; align-items: flex-end; margin-bottom: 12px; gap: 8px; }
        .msg-profile-pic { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .received { background: #e4e6eb; color: #000; }
        .sent { background: #0084ff; color: #fff; align-self: flex-end; margin-left: auto; }
        .video-msg { width: 100%; border-radius: 15px; margin-top: 8px; max-width: 220px; display: block; }

        #premiumModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        .premium-box { background: #fff; color: #000; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; }

        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; color: white; }
        video#mainVideo { width: 100%; height: 100%; object-fit: cover; display: none; }
        video#userPreview { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 10px; display: none; object-fit: cover; border: 1px solid #444; }
        
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #ddd; height: 75px; }
        .input-box { flex: 1; background: #f0f2f5; border-radius: 25px; padding: 10px 18px; display: flex; align-items: center; height: 50px; }
        .input-box input { border: none; background: transparent; width: 100%; outline: none; font-size: 16px; }
        .typing { font-size: 12px; color: #65676b; display: none; margin-left: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <audio id="ringtoneAudio" src="ringtone.mpeg" loop></audio>

    <div id="premiumModal">
        <div class="premium-box">
            <h3>Limit Exceeded!</h3>
            <p>To continue video calls for free, please register on our website.</p>
            <a href="YOUR_AFFILIATE_LINK" style="display:block; background:#0084ff; color:#fff; padding:12px; border-radius:10px; text-decoration:none; margin-top:15px; font-weight:bold;">Register for Free</a>
        </div>
    </div>

    <div id="videoOverlay">
        <div id="callUI" style="position:absolute; top:80px; width:100%; text-align:center; z-index:3001;">
            <img src="profile.webp" style="width:110px; height:110px; border-radius:50%; border:2px solid #fff;">
            <h2 style="margin-top:10px;">Jacklyn Rose</h2>
            <div id="callStatusText">Incoming call...</div>
        </div>
        <video id="mainVideo" playsinline></video>
        <video id="userPreview" autoplay muted playsinline></video>
        <div style="position:absolute; bottom:60px; width:100%; display:flex; justify-content:center; gap:40px; z-index:3002;">
            <div onclick="endCall()" style="width:65px; height:65px; border-radius:50%; background:#fa3e3e; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer;"><i class="fa-solid fa-phone-slash"></i></div>
            <div id="answerBtn" onclick="checkLimitBeforeAccept()" style="width:65px; height:65px; border-radius:50%; background:#31a24c; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer;"><i class="fa-solid fa-video"></i></div>
        </div>
    </div>

    <div class="header">
        <div class="profile-section">
            <div class="img-container">
                <img src="profile.webp" class="header-pic">
                <div class="active-dot"></div>
            </div>
            <div class="user-info">
                <div class="user-name">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></div>
            </div>
        </div>
        <div onclick="startOutgoingCall()" style="color:#0084ff; font-size:26px; cursor:pointer;"><i class="fa-solid fa-video"></i></div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="middle-profile">
            <img src="profile.webp" class="middle-pic">
            <div style="font-size:22px; font-weight:bold;">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></div>
            <div style="color:#65676b; font-size:14px;">Messenger</div>
        </div>
        <div id="messagesArea"></div>
        <div class="typing" id="typingIndicator">Jacklyn is typing...</div>
    </div>

    <div class="footer">
        <i class="fa-solid fa-circle-plus" style="font-size:26px; color:#0084ff;"></i>
        <div class="input-box"><input type="text" id="msgInput" placeholder="Aa"></div>
        <i class="fa-solid fa-paper-plane" id="sendBtn" style="font-size:26px; color:#0084ff; cursor:pointer;"></i>
    </div>

    <script>
        const msgInput = document.getElementById('msgInput');
        const messagesArea = document.getElementById('messagesArea');
        const ringtone = document.getElementById('ringtoneAudio');
        let callCount = 0, msgCount = 0, replyIndex = 0;

        function receiveMessage(text, hasVideo = false) {
            let video = hasVideo ? `<video src="chat_video.mp4" class="video-msg" autoplay muted loop></video>` : '';
            messagesArea.insertAdjacentHTML('beforeend', `
                <div class="message-wrapper">
                    <img src="profile.webp" class="msg-profile-pic">
                    <div class="message received">${text}${video}</div>
                </div>`);
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
            if (replyIndex === 1 || replyIndex === 3) setTimeout(triggerCall, 2500);
        }

        document.getElementById('sendBtn').onclick = () => {
            const val = msgInput.value.trim();
            if (!val) return;
            if (msgCount >= 3) { document.getElementById('premiumModal').style.display='flex'; return; }
            
            msgCount++;
            messagesArea.insertAdjacentHTML('beforeend', `<div class="message-wrapper" style="justify-content:flex-end;"><div class="message sent">${val}</div></div>`);
            msgInput.value = "";
            document.getElementById('typingIndicator').style.display='block';
            
            setTimeout(() => {
                document.getElementById('typingIndicator').style.display='none';
                if (replyIndex === 1) receiveMessage("I have something to show you.. 💋", true);
                else if (replyIndex === 0) receiveMessage("Hey handsome.. 😉");
                else receiveMessage("You look like you know how to treat a lady...");
                replyIndex++;
            }, 3000);
        };

        function triggerCall() {
            document.getElementById('videoOverlay').style.display='block';
            document.getElementById('answerBtn').style.display='flex';
            ringtone.play();
        }

        async function acceptCall() {
            ringtone.pause(); 
            callCount++;
            const vp = document.getElementById('mainVideo');
            // আপনার স্ক্রিনশট অনুযায়ী call2.mp4 নাম দেওয়া হয়েছে
            vp.src = (callCount === 1) ? "call1.mp4" : "call2.mp4";
            
            document.getElementById('callUI').style.display='none';
            vp.style.display='block'; 
            vp.play();
            
            document.getElementById('userPreview').style.display='block';
            try { document.getElementById('userPreview').srcObject = await navigator.mediaDevices.getUserMedia({video:true, audio:true}); } catch(e){}
            
            setTimeout(endCall, callCount === 1 ? 14000 : 12000);
        }

        function checkLimitBeforeAccept() { 
            if(callCount >= 2) { 
                ringtone.pause(); 
                document.getElementById('videoOverlay').style.display='none';
                document.getElementById('premiumModal').style.display='flex'; 
            } else acceptCall(); 
        }

        function endCall() {
            ringtone.pause();
            const vp = document.getElementById('mainVideo');
            vp.pause();
            document.getElementById('videoOverlay').style.display='none';
            // কল শেষ হওয়ার পর কল লগ দেখানোর জন্য চ্যাট রিফ্রেশ না করে মেসেজ অ্যাড করা যায়
            messagesArea.insertAdjacentHTML('beforeend', `<div style="text-align:center; color:#65676b; font-size:12px; margin:10px 0;">Video call ended</div>`);
        }

        function startOutgoingCall() { 
            if(callCount >= 2) document.getElementById('premiumModal').style.display='flex'; 
            else { 
                document.getElementById('videoOverlay').style.display='block'; 
                document.getElementById('answerBtn').style.display='none';
                document.getElementById('callStatusText').innerText = "Calling...";
                setTimeout(acceptCall, 3000); 
            } 
        }
    </script>
</body>
</html>
