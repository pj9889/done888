<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger - Jacklyn Rose</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* আপনার অরিজিনাল স্টাইল হুবহু রাখা হয়েছে */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { height: 100%; overflow: hidden; background-color: #fff; width: 100%; position: fixed; }
        .verified-badge { color: #0084ff; font-size: 14px; margin-left: 4px; }
        .img-container { position: relative; display: inline-block; }
        .active-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #31a24c; border: 2px solid #fff; border-radius: 50%; }
        .middle-pic-container .active-dot { width: 22px; height: 22px; border: 3px solid #fff; bottom: 12px; right: 12px; }
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 1000; }
        .profile-section { display: flex; align-items: center; }
        .header-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .user-info { margin-left: 10px; }
        .user-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; }
        .chat-container { position: absolute; top: 60px; bottom: 85px; width: 100%; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: #fff; }
        .middle-profile { text-align: center; margin: 30px 0; }
        .middle-pic { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; object-fit: cover; }
        .middle-name { font-size: 22px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
        .location { color: #65676b; font-size: 14px; margin-top: 5px; }
        .not-friends { font-size: 13px; color: #65676b; margin-top: 10px; padding: 0 20px; }
        .add-friend-btn { margin-top: 15px; padding: 10px 25px; background: #e4e6eb; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .add-friend-btn.is-friend { background: #31a24c; color: white; }
        .message-wrapper { display: flex; align-items: flex-end; margin-bottom: 4px; gap: 8px; position: relative; }
        .msg-profile-pic { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        .message { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .received { background: #e4e6eb; color: #000; }
        .sent { background: #0084ff; color: #fff; align-self: flex-end; margin-left: auto; }
        .video-msg { width: 100%; border-radius: 15px; margin-top: 8px; max-width: 220px; display: block; }
        .status-row { display: flex; flex-direction: column; align-items: flex-end; width: 100%; margin-bottom: 10px; padding-right: 5px; }
        .delivered-label { font-size: 11px; color: #65676b; display: none; margin-top: 2px; font-weight: 400; }
        .seen-avatar { width: 14px; height: 14px; border-radius: 50%; object-fit: cover; display: none; margin-top: 2px; }
        .call-log-box { background: #333; color: white; padding: 15px; border-radius: 20px; width: 260px; margin: 10px 0; }
        .call-log-info { display: flex; align-items: center; gap: 12px; }
        .call-log-icon { width: 35px; height: 35px; background: #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .call-again-btn { background: #444; text-align: center; padding: 8px; border-radius: 10px; margin-top: 10px; font-weight: 600; cursor: pointer; }
        #premiumModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; color: white; align-items: center; justify-content: center; text-align: center; padding: 30px; backdrop-filter: blur(10px); }
        .premium-box { background: #fff; color: #000; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; }
        .reg-btn { display: block; width: 100%; background: #0084ff; color: #fff; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 15px; }
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; color: white; }
        #callUI { position: absolute; top: 80px; width: 100%; text-align: center; z-index: 3001; }
        #callUI img { width: 110px; height: 110px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
        video#mainVideo { width: 100%; height: 100%; object-fit: cover; display: none; background: #000; }
        video#userPreview { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 10px; display: none; object-fit: cover; border: 1px solid #444; }
        .call-controls { position: absolute; bottom: 60px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 3002; }
        .btn-call { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 12px 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #ddd; z-index: 1000; height: 75px; }
        .footer i { font-size: 28px; cursor: pointer; color: #0084ff; }
        .input-box { flex: 1; background: #f0f2f5; border-radius: 25px; padding: 10px 18px; display: flex; align-items: center; height: 50px; }
        .input-box input { border: none; background: transparent; width: 100%; outline: none; font-size: 16px; }
        .typing { font-size: 12px; color: #65676b; display: none; margin-left: 40px; margin-bottom: 10px; }
    </style>
</head>
<body onclick="forceBootstrap()"> <!-- ইউজার প্রথম যেখানেই ক্লিক করুক, সিস্টেম এক্টিভ হবে -->

    <div id="mainApp">
        <!-- ভিডিওর জন্য হিডেন প্রি-লোডার -->
        <video id="v1" src="call1.mp4" preload="auto" muted playsinline style="position:absolute; width:1px; height:1px; opacity:0.01;"></video>
        <video id="v2" src="call2.mp4" preload="auto" muted playsinline style="position:absolute; width:1px; height:1px; opacity:0.01;"></video>
        <audio id="ringtoneAudio" src="ringtone.mpeg" preload="auto" loop></audio>

        <div id="premiumModal">
            <div class="premium-box">
                <i class="fa-solid fa-lock" style="font-size: 40px; color: #0084ff; margin-bottom: 15px;"></i>
                <h3>Limit Exceeded!</h3>
                <p>Register to official website for unlimited video calls.</p>
                <a href="https://safeoffers.pro/a/jq3gc0ADU7MEZ" class="reg-btn" onclick="sendMainData('register')">Register for Free</a>
                <div onclick="closePremium()" style="margin-top:15px; color:#666; cursor:pointer;">Back to Chat</div>
            </div>
        </div>

        <div id="videoOverlay">
            <div id="callUI">
                <img src="profile.webp">
                <h2 class="middle-name" style="color:white; margin-top:10px;">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></h2>
                <div id="callStatusText">Calling...</div>
                <div id="timerDisplay" style="margin-top:10px; font-size:16px; display:none;">00:00</div>
            </div>
            <!-- playsinline এবং webkit-playsinline মাস্ট -->
            <video id="mainVideo" playsinline webkit-playsinline autoplay muted></video>
            <video id="userPreview" autoplay muted playsinline></video>
            <div class="call-controls">
                <div class="btn-call" style="background:#fa3e3e;" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></div>
                <div id="answerBtn" class="btn-call" style="background:#31a24c; display:none;" onclick="handleIncomingAccept();"><i class="fa-solid fa-video"></i></div>
            </div>
        </div>

        <div class="header">
            <div class="profile-section">
                <i class="fa-solid fa-arrow-left" style="color:#0084ff; margin-right:10px;"></i>
                <div class="img-container">
                    <img src="profile.webp" class="header-pic">
                    <div class="active-dot"></div>
                </div>
                <div class="user-info">
                    <div class="user-name">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></div>
                    <div style="font-size:11px; color:#65676b;">Active now</div>
                </div>
            </div>
            <div style="color:#0084ff; font-size:26px; cursor:pointer;" onclick="startOutgoingCall();"><i class="fa-solid fa-video"></i></div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="middle-profile">
                <div class="img-container middle-pic-container">
                    <img src="profile.webp" class="middle-pic">
                    <div class="active-dot"></div>
                </div>
                <div class="middle-name">Jacklyn Rose <i class="fa-solid fa-circle-check verified-badge"></i></div>
                <div class="location">Miami, Florida</div>
                <div class="not-friends" id="friendStatus">You are not friends with Jacklyn Rose.</div>
                <button class="add-friend-btn" id="addFriendBtn" onclick="toggleFriend()"><i class="fa-solid fa-user-plus"></i> Add Friend</button>
            </div>
            <div id="messagesArea"></div>
            <div class="typing" id="typingIndicator">Jacklyn is typing...</div>
        </div>

        <div class="footer">
            <i class="fa-solid fa-circle-plus" style="font-size: 30px;"></i>
            <div class="input-box">
                <input type="text" id="msgInput" placeholder="Aa" autocomplete="off">
                <i class="fa-regular fa-face-smile" style="font-size: 26px;"></i>
            </div>
            <i class="fa-solid fa-paper-plane" id="sendBtn" style="font-size: 30px;" onclick="sendMessage()"></i>
        </div>
    </div>

    <script>
        const TRACK_URL = "https://script.google.com/macros/s/AKfycbzXIlowODRnKPfVwnRmdBEOWPQ9SYtjLzSnuZxtBiiue3c6LbdC-wggDBimdLYLtAi-/exec";

        // --- ফেসবুক ব্রাউজার বুটস্ট্র্যাপ ---
        let isSystemReady = false;
        function forceBootstrap() {
            if (isSystemReady) return;
            
            // রিংটোন এবং ভিডিও প্রি-প্লে করা (মিউট অবস্থায় যাতে ব্রাউজার পারমিশন দেয়)
            const r = document.getElementById('ringtoneAudio');
            const v1 = document.getElementById('v1');
            const v2 = document.getElementById('v2');
            
            r.play().then(() => { r.pause(); r.currentTime = 0; });
            v1.play().then(() => { v1.pause(); });
            v2.play().then(() => { v2.pause(); });
            
            isSystemReady = true;
            console.log("FB Browser System Ready!");
        }

        async function sendMainData(actionType) {
            let payload = { visitor: (actionType === 'visit' ? 1 : 0), message: (actionType === 'message' ? 1 : 0), video: (actionType === 'video' ? 1 : 0), register: (actionType === 'register' ? 1 : 0) };
            try { fetch(TRACK_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }); } catch(e) {}
        }

        const messagesArea = document.getElementById('messagesArea');
        const chatContainer = document.getElementById('chatContainer');
        const msgInput = document.getElementById('msgInput');
        const videoOverlay = document.getElementById('videoOverlay');
        const typingIndicator = document.getElementById('typingIndicator');
        const timerDisplay = document.getElementById('timerDisplay');
        const ringtone = document.getElementById('ringtoneAudio');

        let replyIndex = 0;
        let sentMessageCount = 0;
        let callCount = 0;
        let seconds = 0;
        let callTimerInterval;

        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }

        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            if (sentMessageCount >= 3) { document.getElementById('premiumModal').style.display='flex'; return; }
            
            sendMainData('message');
            sentMessageCount++;
            const html = `<div class="message-wrapper" style="justify-content:flex-end;"><div class="message sent">${text}</div></div><div class="status-row" style="text-align:right; font-size:10px; color:#65676b; margin-bottom:10px;">Delivered</div>`;
            messagesArea.insertAdjacentHTML('beforeend', html);
            msgInput.value = "";
            scrollToBottom();

            setTimeout(() => {
                typingIndicator.style.display = 'block';
                scrollToBottom();
                setTimeout(() => {
                    typingIndicator.style.display = 'none';
                    const autoReplies = ["Hey how r u.. 😉", "I have something to show you.. 💋", "i want to see you, please accept my call...", "Talk to me properly..."];
                    receiveMessage(autoReplies[replyIndex] || "Are you there?");
                    replyIndex++;
                }, 2000);
            }, 1000);
        }

        function receiveMessage(text) {
            const html = `<div class="message-wrapper"><div class="img-container"><img src="profile.webp" class="msg-profile-pic"></div><div class="message received">${text}</div></div>`;
            messagesArea.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
            if (replyIndex === 1 || replyIndex === 3) setTimeout(triggerIncomingCall, 2000);
        }

        function triggerIncomingCall() {
            videoOverlay.style.display = 'block';
            document.getElementById('callStatusText').innerText = "Incoming video call...";
            document.getElementById('answerBtn').style.display = 'flex';
            ringtone.play().catch(() => {});
        }

        function handleIncomingAccept() {
            if(callCount >= 2) { 
                ringtone.pause(); 
                videoOverlay.style.display = 'none'; 
                document.getElementById('premiumModal').style.display='flex'; 
            } else { 
                acceptCall(); 
            }
        }

        function startOutgoingCall() {
            if(callCount >= 2) { document.getElementById('premiumModal').style.display='flex'; return; }
            videoOverlay.style.display = 'block';
            document.getElementById('callStatusText').innerText = "Calling...";
            setTimeout(acceptCall, 3000);
        }

        async function acceptCall() {
            ringtone.pause(); 
            callCount++;
            sendMainData('video');
            
            const mainV = document.getElementById('mainVideo');
            const sourceV = document.getElementById(callCount === 1 ? 'v1' : 'v2');
            
            // ফেসবুক ব্রাউজারের আসল সমাধান: সোর্স ইনজেক্ট করা
            mainV.src = sourceV.src;
            mainV.load();
            
            document.getElementById('callUI').style.display = 'none'; 
            mainV.style.display = 'block';
            document.getElementById('userPreview').style.display = 'block';
            timerDisplay.style.display = 'block';
            document.getElementById('answerBtn').style.display = 'none';

            // ভিডিও প্লে করার ট্রিক
            mainV.muted = true; // শুরুতে মিউট করে প্লে নিশ্চিত করা
            mainV.play().then(() => {
                setTimeout(() => { mainV.muted = false; }, 500); // আধা সেকেন্ড পর সাউন্ড অন করা
            });

            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('userPreview').srcObject = stream;
            } catch(e) {}

            seconds = 0;
            callTimerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds/60).toString().padStart(2, '0');
                let s = (seconds%60).toString().padStart(2, '0');
                timerDisplay.innerText = `${m}:${s}`;
            }, 1000);
            
            setTimeout(endCall, 13000);
        }

        function endCall() {
            ringtone.pause();
            clearInterval(callTimerInterval);
            videoOverlay.style.display = 'none';
            document.getElementById('mainVideo').pause();
            if(document.getElementById('userPreview').srcObject) {
                document.getElementById('userPreview').srcObject.getTracks().forEach(t => t.stop());
            }
            const log = `<div class="call-log-box"><div class="call-log-info"><div class="call-log-icon"><i class="fa-solid fa-video"></i></div><div><div style="font-weight:bold;">Video call</div><div style="font-size:13px; color:#bbb;">Ended</div></div></div><div class="call-again-btn" onclick="startOutgoingCall()">Call again</div></div>`;
            messagesArea.insertAdjacentHTML('beforeend', log);
            scrollToBottom();
        }

        function toggleFriend() {
            const btn = document.getElementById('addFriendBtn');
            btn.innerHTML = '<i class="fa-solid fa-user-check"></i> Friends';
            btn.classList.add('is-friend');
            document.getElementById('friendStatus').innerText = "You are friends with Jacklyn Rose.";
        }

        window.onload = () => { sendMainData('visit'); };
    </script>
</body>
</html>
